# Hyperparameter search space for hand-shuffle models
# Used by src/training/hyperparam_search.py

# Deep learning models
deep_learning:
  lr: [0.0001, 0.0005, 0.001, 0.005, 0.01]
  batch_size: [4, 8, 16]
  hidden_dim: [32, 64, 128]
  dropout: [0.3, 0.4, 0.5, 0.6]
  num_layers: [1, 2]
  weight_decay: [0.0001, 0.001, 0.01]

# Classical models
random_forest:
  n_estimators: [50, 100, 200, 500]
  max_depth: [3, 5, 10, null]

svm:
  C: [0.01, 0.1, 1.0, 10.0, 100.0]
  gamma: ["scale", "auto"]

logistic_regression:
  C: [0.01, 0.1, 1.0, 10.0]